<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>YS Talent - Profil Kepribadian Kandidat Kaigo</title>
<style>
:root{--primary:#2E9E8F;--primary-dark:#237A6E;--primary-light:#E3F5F2;--accent:#1B4F72;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans",Helvetica,Arial,sans-serif;margin:0;background:#F5F5F7;color:#1F2937;}
.gradient-main{background:linear-gradient(135deg,#6FCF97,#2E9E8F);}
.btn-primary{background:var(--primary);color:#fff;border:none;padding:14px 20px;border-radius:12px;font-weight:600;font-size:16px;cursor:pointer;transition:all .2s;display:inline-block;text-align:center;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:#fff;color:#374151;border:1px solid #D1D5DB;padding:12px 20px;border-radius:12px;font-weight:600;font-size:15px;cursor:pointer;}
.btn-secondary:disabled{opacity:.4;cursor:not-allowed;}
.btn-block{width:100%;}
.option-btn{display:block;width:100%;padding:16px;background:#fff;border:2px solid #E5E7EB;border-radius:12px;text-align:left;font-size:15px;cursor:pointer;transition:all .15s;margin-bottom:10px;line-height:1.4;font-family:inherit;color:#1F2937;}
.option-btn:hover{border-color:var(--primary);background:var(--primary-light);}
.option-btn.selected{border-color:var(--primary);background:var(--primary-light);color:var(--primary-dark);font-weight:600;}
.value-card{position:relative;padding:16px 14px;background:#fff;border:2px solid #E5E7EB;border-radius:14px;text-align:left;cursor:pointer;transition:all .15s;font-family:inherit;color:#1F2937;min-height:88px;}
.value-card.selected{border-color:var(--primary);background:var(--primary-light);}
.value-card .rank-badge{position:absolute;top:-8px;right:-8px;width:26px;height:26px;border-radius:50%;background:var(--primary);color:#fff;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.progress-bar{height:6px;background:#E5E7EB;border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(to right,#6FCF97,#2E9E8F);transition:width .3s;}
.input,.textarea{width:100%;padding:14px;border:1px solid #D1D5DB;border-radius:10px;font-size:16px;background:#fff;font-family:inherit;}
.input:focus,.textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(46,158,143,.15);}
.card{background:#fff;border-radius:14px;padding:18px;box-shadow:0 2px 4px rgba(0,0,0,.04);border:1px solid #E5E7EB;}
.label{font-size:13px;font-weight:600;color:#4B5563;margin-bottom:6px;display:block;}
.fade-in{animation:fadeIn .25s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.quiz-container{max-width:520px;margin:0 auto;padding:0 16px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/common.js"></script>
<script>
const LIKERT_OPTIONS=[
  {value:5,ja:'とてもあてはまる',idn:'Sangat sesuai'},
  {value:4,ja:'ややあてはまる',idn:'Cukup sesuai'},
  {value:3,ja:'どちらともいえない',idn:'Netral'},
  {value:2,ja:'あまりあてはまらない',idn:'Kurang sesuai'},
  {value:1,ja:'まったくあてはまらない',idn:'Sangat tidak sesuai'}
];

const quiz={
  step:'loading',
  data:null,
  values:null,
  candidate:{name:'',birthDate:'',province:''},
  idx:0,
  answers:{},
  valueOrder:[],
  freeText:'',
  startTime:null,
  submitting:false,
  error:null
};

async function loadData(){
  try{
    const [qRes,vRes]=await Promise.all([fetch('data/questions.json'),fetch('data/values.json')]);
    quiz.data=await qRes.json();
    quiz.values=await vRes.json();
    quiz.step='start';
  }catch(e){
    quiz.step='loaderror';
    quiz.error=e.message;
  }
  render();
}

function render(){
  const app=document.getElementById('app');
  if(quiz.step==='loading'){app.innerHTML=renderLoading();return;}
  if(quiz.step==='loaderror'){app.innerHTML=renderLoadError();return;}
  if(quiz.step==='start'){app.innerHTML=renderStart();return;}
  if(quiz.step==='partA'){app.innerHTML=renderPartA();return;}
  if(quiz.step==='partB'){app.innerHTML=renderPartB();return;}
  if(quiz.step==='partC'){app.innerHTML=renderPartC();return;}
  if(quiz.step==='submitting'){app.innerHTML=renderSubmitting();return;}
  if(quiz.step==='submiterror'){app.innerHTML=renderSubmitError();return;}
  if(quiz.step==='done'){app.innerHTML=renderDone();return;}
}

function renderLoading(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:14px;">Memuat... / 読み込み中...</div>`;
}
function renderLoadError(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;color:#DC2626;font-size:14px;">
    Gagal memuat data pertanyaan.<br>設問データの読み込みに失敗しました。<br><br>${esc(quiz.error||'')}
  </div>`;
}

//==========================================================
// 開始画面
//==========================================================
function renderStart(){
  return `
  <div style="min-height:100vh;display:flex;flex-direction:column;">
    <div class="gradient-main" style="padding:32px 16px 80px;color:#fff;text-align:center;">
      <div style="font-size:32px;font-weight:800;margin-bottom:8px;">YS Talent</div>
      <div style="font-size:18px;font-weight:600;opacity:.95;">Profil Kepribadian Kandidat</div>
      <div style="font-size:13px;opacity:.9;margin-top:8px;">介護候補者向け 性格診断</div>
    </div>
    <div class="quiz-container" style="margin-top:-60px;flex:1;">
      <div class="card">
        <h2 style="font-size:18px;font-weight:700;margin:0 0 12px;">Selamat datang! 👋</h2>
        <p style="font-size:14px;color:#4B5563;line-height:1.6;margin:0 0 16px;">
          Terima kasih atas minat Anda untuk bekerja di bidang perawatan lansia (kaigo) di Jepang.<br>
          Mohon isi kuesioner singkat ini dengan jujur.
        </p>
        <div style="background:#E3F5F2;border-radius:10px;padding:12px;font-size:13px;color:#237A6E;margin-bottom:20px;">
          <strong>📋 Informasi / お知らせ:</strong><br>
          • Tidak ada jawaban benar/salah / 正解・不正解はありません<br>
          • Jawab sejujurnya / 正直にお答えください<br>
          • Hasil hanya dilihat oleh staf YST / FTI / 結果はYST・FTIスタッフのみ閲覧します
        </div>
        <div style="margin-bottom:14px;">
          <label class="label">Nama lengkap (huruf Latin, sesuai paspor)<br><span style="font-weight:400;color:#9CA3AF;font-size:11px;">氏名（ローマ字・パスポート表記）</span></label>
          <input class="input" id="q-name" placeholder="Contoh: Siti Nur Aisyah" value="${esc(quiz.candidate.name)}">
        </div>
        <div style="margin-bottom:14px;">
          <label class="label">Tanggal lahir<br><span style="font-weight:400;color:#9CA3AF;font-size:11px;">生年月日</span></label>
          <input class="input" type="date" id="q-birth" value="${esc(quiz.candidate.birthDate)}">
        </div>
        <div style="margin-bottom:24px;">
          <label class="label">Provinsi asal<br><span style="font-weight:400;color:#9CA3AF;font-size:11px;">出身地（州）</span></label>
          <input class="input" id="q-province" placeholder="Contoh: Jawa Tengah" value="${esc(quiz.candidate.province)}">
        </div>
        <button class="btn-primary btn-block" onclick="startQuiz()">Mulai → 開始</button>
      </div>
    </div>
    <div style="text-align:center;padding:20px 16px;font-size:11px;color:#9CA3AF;">© YS Talent - Program Kandidat Kaigo</div>
  </div>`;
}

function startQuiz(){
  const name=document.getElementById('q-name').value.trim();
  const birthDate=document.getElementById('q-birth').value;
  const province=document.getElementById('q-province').value.trim();
  if(!name||!birthDate||!province){
    alert('Semua kolom wajib diisi / すべての項目を入力してください');
    return;
  }
  quiz.candidate={name,birthDate,province};
  quiz.step='partA';
  quiz.idx=0;
  quiz.startTime=Date.now();
  render();
}

//==========================================================
// Part A: 性格傾向（30問リッカート）
//==========================================================
function renderPartA(){
  const questions=quiz.data.questions;
  const q=questions[quiz.idx];
  const cat=quiz.data.categories[q.category];
  const progress=(quiz.idx+1)/questions.length*100;
  const cur=quiz.answers[q.qid];
  return `
  <div style="min-height:100vh;background:#F5F5F7;">
    <div style="background:#fff;border-bottom:1px solid #E5E7EB;padding:12px 16px;position:sticky;top:0;z-index:10;">
      <div class="quiz-container" style="padding:0;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="font-size:11px;color:#6B7280;font-weight:600;">${esc(cat.idn)} / ${esc(cat.ja)}</span>
          <span style="font-size:11px;color:#6B7280;">${quiz.idx+1} / ${questions.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%;"></div></div>
      </div>
    </div>
    <div class="quiz-container" style="padding-top:20px;padding-bottom:20px;">
      <div class="fade-in">
        <h2 style="font-size:18px;font-weight:700;line-height:1.4;margin:0 0 8px;">${esc(q.idn)}</h2>
        <p style="font-size:13px;color:#9CA3AF;margin:0 0 20px;">${esc(q.ja)}</p>
        ${LIKERT_OPTIONS.map(o=>`
          <button class="option-btn ${cur===o.value?'selected':''}" onclick="selectLikert('${q.qid}',${o.value})">
            <div>${esc(o.idn)}</div>
            <div style="font-size:11px;color:#9CA3AF;margin-top:4px;">${esc(o.ja)}</div>
          </button>
        `).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn-secondary" style="flex:1;" onclick="prevPartA()" ${quiz.idx===0?'disabled':''}>← Sebelumnya</button>
        <button class="btn-primary" style="flex:2;" id="nextBtnA" ${cur==null?'disabled':''} onclick="nextPartA()">${quiz.idx===questions.length-1?'Lanjut →':'Berikutnya →'}</button>
      </div>
    </div>
  </div>`;
}

function selectLikert(qid,val){
  quiz.answers[qid]=val;
  render();
}
function prevPartA(){
  if(quiz.idx>0){quiz.idx--;render();}
}
function nextPartA(){
  const q=quiz.data.questions[quiz.idx];
  if(quiz.answers[q.qid]==null){alert('Mohon pilih salah satu / 選択してください');return;}
  if(quiz.idx<quiz.data.questions.length-1){
    quiz.idx++;
  }else{
    quiz.step='partB';
  }
  render();
}

//==========================================================
// Part B: 価値観カード（8枚から大切な順に3枚）
//==========================================================
function renderPartB(){
  const cards=quiz.values.cards;
  const done=quiz.valueOrder.length===3;
  return `
  <div style="min-height:100vh;background:#F5F5F7;">
    <div class="quiz-container" style="padding-top:24px;padding-bottom:20px;">
      <h2 style="font-size:18px;font-weight:700;margin:0 0 6px;">Pilih 3 hal yang paling penting bagi Anda, sesuai urutan.</h2>
      <p style="font-size:13px;color:#9CA3AF;margin:0 0 6px;">あなたが大切だと思うものを、大切な順に3つ選んでください。</p>
      <p style="font-size:12px;color:#6B7280;margin:0 0 18px;">Ketuk sesuai urutan (1 = paling penting) / タップした順に1〜3位となります</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        ${cards.map(c=>{
          const rank=quiz.valueOrder.indexOf(c.vid);
          const selected=rank>=0;
          return `
          <button class="value-card ${selected?'selected':''}" onclick="toggleValueCard('${c.vid}')">
            ${selected?`<span class="rank-badge">${rank+1}</span>`:''}
            <div style="font-size:14px;font-weight:600;line-height:1.4;">${esc(c.idn)}</div>
            <div style="font-size:11px;color:#9CA3AF;margin-top:6px;">${esc(c.ja)}</div>
          </button>`;
        }).join('')}
      </div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button class="btn-secondary" style="flex:1;" onclick="backToPartA()">← Sebelumnya</button>
        <button class="btn-primary" style="flex:2;" ${done?'':'disabled'} onclick="goToPartC()">Berikutnya →</button>
      </div>
    </div>
  </div>`;
}

function toggleValueCard(vid){
  const i=quiz.valueOrder.indexOf(vid);
  if(i>=0){
    quiz.valueOrder.splice(i,1);
  }else{
    if(quiz.valueOrder.length>=3)return;
    quiz.valueOrder.push(vid);
  }
  render();
}
function backToPartA(){
  quiz.idx=quiz.data.questions.length-1;
  quiz.step='partA';
  render();
}
function goToPartC(){
  quiz.step='partC';
  render();
}

//==========================================================
// Part C: 自由記述（任意）
//==========================================================
function renderPartC(){
  const len=(quiz.freeText||'').length;
  return `
  <div style="min-height:100vh;background:#F5F5F7;">
    <div class="quiz-container" style="padding-top:24px;padding-bottom:20px;">
      <h2 style="font-size:18px;font-weight:700;margin:0 0 6px;">Mengapa Anda memilih pekerjaan di bidang perawatan lansia (kaigo)?</h2>
      <p style="font-size:13px;color:#9CA3AF;margin:0 0 18px;">なぜ介護の仕事を選びましたか？（任意）</p>
      <textarea class="textarea" rows="6" id="q-freetext" maxlength="200" placeholder="Tulis jawaban Anda di sini (opsional)..." oninput="updateFreeText(this.value)">${esc(quiz.freeText)}</textarea>
      <p style="font-size:11px;color:#9CA3AF;margin:6px 0 0;text-align:right;">${len} / 200</p>
      <div style="display:flex;gap:10px;margin-top:20px;">
        <button class="btn-secondary" style="flex:1;" onclick="backToPartB()">← Sebelumnya</button>
        <button class="btn-primary" style="flex:2;" onclick="submitQuiz()">Kirim ✓ 送信</button>
      </div>
    </div>
  </div>`;
}
function updateFreeText(v){quiz.freeText=v;}
function backToPartB(){quiz.step='partB';render();}

//==========================================================
// 送信
//==========================================================
function renderSubmitting(){
  return `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#6B7280;font-size:14px;">Mengirim... / 送信中...</div>`;
}
function renderSubmitError(){
  return `
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;">
    <p style="color:#DC2626;font-size:14px;margin-bottom:16px;">Gagal mengirim jawaban. Silakan coba lagi.<br>送信に失敗しました。もう一度お試しください。</p>
    <p style="color:#9CA3AF;font-size:11px;margin-bottom:16px;">${esc(quiz.error||'')}</p>
    <button class="btn-primary" onclick="submitQuiz()">Coba lagi / 再送信</button>
  </div>`;
}

async function submitQuiz(){
  if(quiz.submitting)return;
  if(!isSupabaseConfigured()){
    quiz.step='submiterror';
    quiz.error='Supabase belum dikonfigurasi (js/supabase-config.js) / Supabase未設定です';
    render();
    return;
  }
  quiz.submitting=true;
  quiz.step='submitting';
  render();
  try{
    const durationSec=Math.round((Date.now()-quiz.startTime)/1000);
    const flags=detectFlags(quiz.answers,quiz.data.questions,quiz.data.categoryOrder,durationSec);
    const sb=getSupabaseClient();
    const candidateId=crypto.randomUUID();
    const {error:candErr}=await sb.from('candidates').insert({
      id:candidateId,
      name:quiz.candidate.name,
      birth_date:quiz.candidate.birthDate,
      province:quiz.candidate.province
    });
    if(candErr)throw candErr;
    const {error:respErr}=await sb.from('responses').insert({
      candidate_id:candidateId,
      answers:quiz.answers,
      values_top3:quiz.valueOrder,
      free_text:quiz.freeText||null,
      duration_sec:durationSec,
      flags:flags
    });
    if(respErr)throw respErr;
    quiz.submitting=false;
    quiz.step='done';
    render();
  }catch(e){
    quiz.submitting=false;
    quiz.step='submiterror';
    quiz.error=e.message||String(e);
    render();
  }
}

function renderDone(){
  return `
  <div style="min-height:100vh;background:#F5F5F7;">
    <div class="gradient-main" style="padding:60px 16px 40px;color:#fff;text-align:center;">
      <div style="font-size:64px;margin-bottom:10px;">✅</div>
      <h1 style="font-size:22px;font-weight:800;margin:0 0 8px;">Jawaban Anda telah terkirim.</h1>
      <p style="font-size:14px;opacity:.95;margin:0;">Terima kasih. / 回答を送信しました。ありがとうございました。</p>
    </div>
    <div class="quiz-container" style="padding-top:24px;text-align:center;">
      <button class="btn-secondary" onclick="resetQuiz()">Isi untuk kandidat lain / 次の人が回答する</button>
    </div>
  </div>`;
}

function resetQuiz(){
  quiz.step='start';
  quiz.idx=0;
  quiz.answers={};
  quiz.valueOrder=[];
  quiz.freeText='';
  quiz.candidate={name:'',birthDate:'',province:''};
  quiz.startTime=null;
  quiz.error=null;
  render();
}

loadData();
</script>
</body>
</html>
